<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Paw Pack Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:#F8F9FA;color:#2d3748}h1,h2{font-weight:900}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#004E64}.lb{background:white;padding:50px;border-radius:24px;max-width:400px;width:100%;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.2)}.lb h2{color:#004E64;margin-bottom:24px;font-size:2rem}.lb input{width:100%;padding:16px;border:2px solid #e2e8f0;border-radius:12px;margin-bottom:15px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:600}.lb button{width:100%;padding:16px;background:#FF6B35;color:white;border:none;border-radius:50px;font-weight:800;cursor:pointer;font-size:1rem;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:0.3s}.lb button:hover{background:#e55a29}
.dash{display:none}.dh{background:#004E64;color:white;padding:25px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:1px solid #007190}.dh h1{font-size:1.8rem}.dh button,.dh a{padding:12px 24px;border-radius:50px;border:2px solid #FF6B35;cursor:pointer;font-size:0.9rem;color:#FF6B35;background:transparent;text-decoration:none;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:1px;font-weight:800;transition:0.3s}.dh button:hover,.dh a:hover{background:#FF6B35;color:white}.be{background:#FF6B35!important;color:white!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding:40px}.sc{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,78,100,0.08);text-align:center}.sl{font-size:0.9rem;color:#718096;text-transform:uppercase;letter-spacing:1px;font-weight:800}.sv{font-size:3.5rem;font-weight:900;margin-top:10px;color:#004E64}
.tw{padding:0 40px 40px;overflow-x:auto}table{width:100%;border-collapse:separate;border-spacing:0;background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,78,100,0.08)}th{background:#f1f5f9;color:#004E64;padding:20px;text-align:left;font-size:0.9rem;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #e2e8f0;font-weight:800}td{padding:20px;border-bottom:1px solid #f1f5f9;font-size:0.95rem;font-weight:600}
select.st{padding:10px 14px;border:2px solid #e2e8f0;border-radius:12px;font-family:'Nunito',sans-serif;background:#F8F9FA;outline:none;color:#2d3748;font-weight:700}.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;font-weight:800}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>Staff Login</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()">Enter Dashboard</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Pack Manager</h1><div><button class="be" onclick="exp()">Export Data</button> <a href="index.html">View Site</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Requests</div><div class="sv" id="st">0</div></div><div class="sc"><div class="sl">Pending</div><div class="sv" id="sn" style="color:#FF6B35">0</div></div><div class="sc"><div class="sl">Confirmed</div><div class="sv" id="sd" style="color:#10b981">0</div></div></div>
<div class="tw"><table><thead><tr><th>Rec'd</th><th>Parent Name</th><th>Phone</th><th>Dog Name</th><th>Breed & Age</th><th>Service</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='pawpack_bookings';if(sessionStorage.getItem('pp_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('pp_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('pp_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='Pending').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Confirmed').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td>${i.ownerName||'—'}</td><td>${i.phone||'—'}</td><td style="color:#FF6B35;font-weight:800">${i.dogName||'—'}</td><td>${i.dogBreed||'—'}</td><td>${i.service||'—'}</td><td>${i.date||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['Pending','Contacted','Confirmed','Checked In','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">Del</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Delete this booking?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Received','Parent','Phone','Dog','Breed','Service','Date','Notes','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.ownerName,i.phone,i.dogName,i.dogBreed,i.service,i.date,(i.notes||'').replace(/\n/g,' '),i.status]);const c=[h,...r].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pawpack_bookings.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
